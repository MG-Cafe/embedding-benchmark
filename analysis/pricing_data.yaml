# =============================================================================
# GCP GPU Instance Pricing for Cost Analysis
# =============================================================================
#
# These prices are used to calculate the $/million tokens metric in the
# throughput-vs-cost matrix.
#
# Pricing source: https://cloud.google.com/compute/gpus-pricing
# Last updated: May 2026
#
# IMPORTANT: Verify these prices against the current GCP pricing page
# before sharing results with the user. GPU pricing changes periodically.
#
# How cost calculation works:
#   1. We measure throughput (tokens/sec) at each concurrency level
#   2. We calculate tokens/hour = tokens/sec × 3600
#   3. We calculate $/million_tokens = (hourly_cost / tokens_per_hour) × 1,000,000
#
# This gives the user the key metric they need: for every million tokens
# they process, how many dollars does it cost in infrastructure?
# =============================================================================

# ---------------------------------------------------------------------------
# G2 Instances (NVIDIA L4) — the user's current baseline
# ---------------------------------------------------------------------------
# Included for reference even though we're not benchmarking L4 in this POC.
# the user currently runs 15-60 L4s on Cloud Run. These prices help them
# compare their current costs against the new G4 results.
# ---------------------------------------------------------------------------
g2:
  gpu_name: "NVIDIA L4"
  gpu_memory_gb: 24

  # g2-standard-8: 8 vCPU, 32 GB RAM, 1× L4
  single_gpu:
    machine_type: "g2-standard-8"
    accelerator_count: 1
    # On-demand pricing ($/hour) — us-central1
    on_demand_hourly_usd: 1.402
    # 1-year committed use discount (CUD) — typically 37% off
    cud_1yr_hourly_usd: 0.883
    # 3-year committed use discount — typically 55% off
    cud_3yr_hourly_usd: 0.631

  # g2-standard-24: 24 vCPU, 96 GB RAM, 2× L4
  dual_gpu:
    machine_type: "g2-standard-24"
    accelerator_count: 2
    on_demand_hourly_usd: 2.804
    cud_1yr_hourly_usd: 1.767
    cud_3yr_hourly_usd: 1.262

# ---------------------------------------------------------------------------
# G4 Instances (NVIDIA RTX Pro 6000) — What we're benchmarking
# ---------------------------------------------------------------------------
# RTX Pro 6000 has 48GB VRAM (2× L4's 24GB), higher memory bandwidth,
# and more CUDA cores. The Jina team previously found better price/perf
# with RTX 6000 vs L4 for embedding workloads.
#
# NOTE: G4 machine types and pricing may vary by region. These are
# approximate values. Update with actual pricing from your GCP console.
# ---------------------------------------------------------------------------
g4:
  gpu_name: "NVIDIA RTX Pro 6000"
  gpu_memory_gb: 48

  # Single GPU configuration
  single_gpu:
    machine_type: "g4-standard-8"
    accelerator_count: 1
    # On-demand pricing ($/hour) — verify in GCP console for your region
    # RTX Pro 6000 is typically ~$2.50-3.50/hr depending on region
    on_demand_hourly_usd: 3.054
    # CUD pricing — verify availability for G4 instances
    cud_1yr_hourly_usd: 1.924
    cud_3yr_hourly_usd: 1.374

  # Dual GPU configuration
  dual_gpu:
    machine_type: "g4-standard-16"
    accelerator_count: 2
    on_demand_hourly_usd: 6.108
    cud_1yr_hourly_usd: 3.848
    cud_3yr_hourly_usd: 2.749
